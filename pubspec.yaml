name: tasarruf_x
description: Kişisel finans ve bileşik faiz takip uygulaması
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.4
  fl_chart: ^0.69.0
  provider: ^6.1.2
  intl: ^0.19.0
  timezone: ^0.9.4
  flutter_timezone: ^2.0.0
  google_mobile_ads: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png"
  min_ios_version: "17.0"

flutter:
  uses-material-design: true
  assets:
    - Resources/alintilar.json
