workflows:

  # ── TestFlight'a yükle (test aşaması) ──────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
        XCODE_SCHEME: "TasarrufX"
        APP_NAME: "TasarrufX"
      xcode: "26"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: XcodeGen kur
        script: |
          brew install xcodegen

      - name: Xcode projesi oluştur
        script: |
          xcodegen generate --spec project.yml

      - name: Keychain başlat
        script: |
          keychain initialize

      - name: Sertifika ve profil oluştur (yoksa otomatik yarat)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Sertifikaları keychain'e ekle
        script: |
          keychain add-certificates

      - name: Xcode imzalama profilini ayarla
        script: |
          xcode-project use-profiles

      - name: Build numarasını ayarla
        script: |
          BUILD_NUM=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEXT=$((BUILD_NUM + 1))
          agvtool new-version -all "$NEXT"

      - name: Archive olustur
        script: |
          xcodebuild archive \
            -project TasarrufX.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/TasarrufX.xcarchive \
            -destination "generic/platform=iOS" \
            | xcpretty --simple --no-utf 2>/dev/null || true
          ls -la /tmp/TasarrufX.xcarchive/Products/Applications/ || true

      - name: Archive icindeki plist ve ikonu duzelt
        script: |
          APP=$(find /tmp/TasarrufX.xcarchive/Products -name "*.app" | head -1)
          echo "App: $APP"
          PLIST="$APP/Info.plist"

          echo "=== MEVCUT PLIST ==="
          plutil -p "$PLIST"

          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$PLIST"

          cp Assets.xcassets/AppIcon.appiconset/AppIcon-120.png "$APP/AppIcon-60@2x.png"

          echo "=== DUZELTME SONRASI ==="
          plutil -p "$PLIST" | grep -E "CFBundle|icon"
          ls -la "$APP"/*.png || true

      - name: IPA export et (Xcode yeniden imzalar)
        script: |
          mkdir -p build/ios/ipa

          cat > /tmp/ExportOptions.plist << 'EOPLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          EOPLIST

          xcodebuild -exportArchive \
            -archivePath /tmp/TasarrufX.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            | xcpretty --simple --no-utf 2>/dev/null || true

          echo "=== EXPORTED IPA ==="
          ls -la build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false


  # ── App Store'a gönder (production) ────────────────────────────────
  ios-app-store:
    name: iOS → App Store
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
        XCODE_SCHEME: "TasarrufX"
      xcode: "26"

    scripts:
      - name: XcodeGen kur
        script: brew install xcodegen

      - name: Xcode projesi oluştur
        script: xcodegen generate --spec project.yml

      - name: Keychain başlat
        script: keychain initialize

      - name: Sertifika ve profil oluştur
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Sertifikaları keychain'e ekle
        script: keychain add-certificates

      - name: Xcode imzalama profilini ayarla
        script: xcode-project use-profiles

      - name: Archive olustur
        script: |
          xcodebuild archive \
            -project TasarrufX.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/TasarrufX.xcarchive \
            -destination "generic/platform=iOS"

      - name: Archive icindeki plist ve ikonu duzelt
        script: |
          APP=$(find /tmp/TasarrufX.xcarchive/Products -name "*.app" | head -1)
          PLIST="$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$PLIST"
          cp Assets.xcassets/AppIcon.appiconset/AppIcon-120.png "$APP/AppIcon-60@2x.png"

      - name: IPA export et
        script: |
          mkdir -p build/ios/ipa
          cat > /tmp/ExportOptions.plist << 'EOPLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOPLIST
          xcodebuild -exportArchive \
            -archivePath /tmp/TasarrufX.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: true
        release_type: MANUAL
