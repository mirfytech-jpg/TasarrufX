workflows:

  # ── TestFlight'a yükle ─────────────────────────────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
      flutter: stable
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter iOS projesi olustur
        script: |
          # Mevcut lib ve pubspec'i yedekle
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml

          # Flutter create ile iOS altyapisini olustur (ios/ klasörü)
          flutter create \
            --platforms ios \
            --org com.mirfytech \
            --project-name tasarruf_x \
            --ios-language swift \
            --no-pub \
            .

          # Kendi dosyalarimizi geri yukle
          rm -rf lib
          cp -r /tmp/lib_backup lib
          cp /tmp/pubspec_backup.yaml pubspec.yaml

          # Bundle ID'yi duzelt.
          # flutter create project-name icindeki alt cizgiyi (underscore) bundle ID'de
          # siliyor: tasarruf_x → tasarrufx  (iOS bundle ID'de _ gecersiz)
          # Her iki olasi formu da degistir: tasarruf_x VE tasarrufx
          sed -i '' -E \
            's/com\.mirfytech\.tasarruf_?x/com.mirfytech.TasarrufX/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' -E \
            's/com\.mirfytech\.tasarruf_?x/com.mirfytech.TasarrufX/g' \
            ios/Runner/Info.plist 2>/dev/null || true

          echo "=== Bundle ID kontrolü ==="
          grep "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj

          # AdMob App ID ve App Tracking Transparency izni Info.plist'e ekle
          /usr/libexec/PlistBuddy \
            -c "Add :GADApplicationIdentifier string ca-app-pub-4055315573310307~8843002768" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy \
            -c "Set :GADApplicationIdentifier ca-app-pub-4055315573310307~8843002768" \
            ios/Runner/Info.plist
          /usr/libexec/PlistBuddy \
            -c "Add :NSUserTrackingUsageDescription string Reklam deneyimini kisisellestirebilmek icin kullanilir." \
            ios/Runner/Info.plist 2>/dev/null || true
          echo "GADApplicationIdentifier eklendi."

      - name: Keychain başlat
        script: keychain initialize

      - name: Sertifika ve profil olustur
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Sertifikalari keychain'e ekle
        script: keychain add-certificates

      - name: Flutter pub get
        script: flutter pub get

      - name: Ikon olustur
        script: dart run flutter_launcher_icons

      - name: Xcode imzalama profilini ayarla
        script: xcode-project use-profiles

      - name: CocoaPods surumunu duzenle
        script: |
          # CocoaPods 1.16.x Molinillo resolver hatasina karsi 1.15.2 kullan
          gem install cocoapods -v '1.15.2' --no-document
          gem uninstall cocoapods -v '1.16.2' --force 2>/dev/null || true
          pod --version

      - name: Flutter build IPA
        script: |
          # Build numarasini belirle — hata durumunda 0 fallback
          RAW=$(app-store-connect get-latest-testflight-build-number \
            "$BUNDLE_ID" 2>/dev/null || true)
          # Yalnızca rakamları al, bos veya non-numeric cikti durumunu ele al
          BUILD_NUM=$(echo "$RAW" | grep -oE '[0-9]+' | tail -1 || echo "")
          BUILD_NUM=${BUILD_NUM:-0}
          NEXT=$((BUILD_NUM + 1))
          echo "Son TestFlight build: ${BUILD_NUM}, yeni build: ${NEXT}"

          flutter build ipa --release --build-number=$NEXT
          echo "=== IPA dosyalari ==="
          ls -la build/ios/ipa/ || true

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false


  # ── App Store'a gönder (production) ────────────────────────────────────────
  ios-app-store:
    name: iOS → App Store
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter iOS projesi olustur
        script: |
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml
          flutter create --platforms ios --org com.mirfytech \
            --project-name tasarruf_x --ios-language swift --no-pub .
          rm -rf lib && cp -r /tmp/lib_backup lib
          cp /tmp/pubspec_backup.yaml pubspec.yaml
          sed -i '' -E \
            's/com\.mirfytech\.tasarruf_?x/com.mirfytech.TasarrufX/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' -E \
            's/com\.mirfytech\.tasarruf_?x/com.mirfytech.TasarrufX/g' \
            ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy \
            -c "Add :GADApplicationIdentifier string ca-app-pub-4055315573310307~8843002768" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy \
            -c "Set :GADApplicationIdentifier ca-app-pub-4055315573310307~8843002768" \
            ios/Runner/Info.plist
          /usr/libexec/PlistBuddy \
            -c "Add :NSUserTrackingUsageDescription string Reklam deneyimini kisisellestirebilmek icin kullanilir." \
            ios/Runner/Info.plist 2>/dev/null || true

      - name: Keychain başlat
        script: keychain initialize

      - name: Sertifika ve profil olustur
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY --create

      - name: Sertifikalari keychain'e ekle
        script: keychain add-certificates

      - name: Flutter pub get
        script: flutter pub get

      - name: Ikon olustur
        script: dart run flutter_launcher_icons

      - name: Xcode imzalama profilini ayarla
        script: xcode-project use-profiles

      - name: CocoaPods surumunu duzenle
        script: |
          # CocoaPods 1.16.x Molinillo resolver hatasina karsi 1.15.2 kullan
          gem install cocoapods -v '1.15.2' --no-document
          gem uninstall cocoapods -v '1.16.2' --force 2>/dev/null || true
          pod --version

      - name: Flutter build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: true
        release_type: MANUAL
