workflows:

  # ── TestFlight'a yükle ─────────────────────────────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
      flutter: stable
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter iOS projesi olustur
        script: |
          # Mevcut lib ve pubspec'i yedekle
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml

          # Flutter create ile iOS altyapisini olustur (ios/ klasörü)
          flutter create \
            --platforms ios \
            --org com.mirfytech \
            --project-name tasarruf_x \
            --ios-language swift \
            --no-pub \
            .

          # Kendi dosyalarimizi geri yukle
          rm -rf lib
          cp -r /tmp/lib_backup lib
          cp /tmp/pubspec_backup.yaml pubspec.yaml

          # Bundle ID'yi duzelt.
          # flutter create -> com.mirfytech.tasarruf_x (hepsi küçük harf)
          # İstediğimiz -> com.mirfytech.TasarrufX
          # Noktalari kaçırarak regex güvenli sed kullan.
          sed -i '' \
            's/com\.mirfytech\.tasarruf_x/com.mirfytech.TasarrufX/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' \
            's/com\.mirfytech\.tasarruf_x/com.mirfytech.TasarrufX/g' \
            ios/Runner/Info.plist 2>/dev/null || true

          echo "=== Bundle ID kontrolü ==="
          grep "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj

      - name: Keychain başlat
        script: keychain initialize

      - name: Sertifika ve profil olustur
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Sertifikalari keychain'e ekle
        script: keychain add-certificates

      - name: Flutter pub get
        script: flutter pub get

      - name: Ikon olustur
        script: dart run flutter_launcher_icons

      - name: Xcode imzalama profilini ayarla
        script: xcode-project use-profiles

      - name: Flutter build IPA
        script: |
          BUILD_NUM=$(app-store-connect get-latest-testflight-build-number \
            "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEXT=$((BUILD_NUM + 1))
          echo "Build numarasi: $NEXT"
          flutter build ipa --release --build-number=$NEXT
          echo "=== IPA dosyalari ==="
          ls -la build/ios/ipa/ || true

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false


  # ── App Store'a gönder (production) ────────────────────────────────────────
  ios-app-store:
    name: iOS → App Store
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter iOS projesi olustur
        script: |
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml
          flutter create --platforms ios --org com.mirfytech \
            --project-name tasarruf_x --ios-language swift --no-pub .
          rm -rf lib && cp -r /tmp/lib_backup lib
          cp /tmp/pubspec_backup.yaml pubspec.yaml
          sed -i '' \
            's/com\.mirfytech\.tasarruf_x/com.mirfytech.TasarrufX/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' \
            's/com\.mirfytech\.tasarruf_x/com.mirfytech.TasarrufX/g' \
            ios/Runner/Info.plist 2>/dev/null || true

      - name: Keychain başlat
        script: keychain initialize

      - name: Sertifika ve profil olustur
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY --create

      - name: Sertifikalari keychain'e ekle
        script: keychain add-certificates

      - name: Flutter pub get
        script: flutter pub get

      - name: Ikon olustur
        script: dart run flutter_launcher_icons

      - name: Xcode imzalama profilini ayarla
        script: xcode-project use-profiles

      - name: Flutter build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: true
        release_type: MANUAL
