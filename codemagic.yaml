workflows:

  # ── TestFlight'a yükle (test aşaması) ──────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
        XCODE_SCHEME: "TasarrufX"
        APP_NAME: "TasarrufX"
      xcode: "26"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: XcodeGen kur
        script: |
          brew install xcodegen

      - name: Xcode projesi oluştur
        script: |
          xcodegen generate --spec project.yml

      - name: İkon ve asset kataloğunu doğrula
        script: |
          echo "=== AppIcon PNG dosyaları ==="
          ls -la Assets.xcassets/AppIcon.appiconset/*.png
          echo ""
          echo "=== Contents.json ==="
          cat Assets.xcassets/AppIcon.appiconset/Contents.json
          echo ""
          echo "=== ASSETCATALOG_COMPILER_APPICON_NAME build ayarı ==="
          grep -r "AppIcon" TasarrufX.xcodeproj/project.pbxproj | grep ASSETCATALOG || echo "Ayar bulunamadı"
          echo ""
          echo "=== GENERATE_INFOPLIST_FILE build ayarı ==="
          grep -r "GENERATE_INFOPLIST_FILE" TasarrufX.xcodeproj/project.pbxproj | head -5

      - name: Keychain başlat
        script: |
          keychain initialize

      - name: Sertifika ve profil oluştur (yoksa otomatik yarat)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Sertifikaları keychain'e ekle
        script: |
          keychain add-certificates

      - name: Xcode imzalama profilini ayarla
        script: |
          xcode-project use-profiles

      - name: Build numarasını ayarla
        script: |
          BUILD_NUM=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEXT=$((BUILD_NUM + 1))
          agvtool new-version -all "$NEXT"

      - name: Derle ve IPA oluştur
        script: |
          xcode-project build-ipa \
            --project TasarrufX.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --config Release

      - name: IPA içindeki ikonları ve Info.plist'i kontrol et
        script: |
          IPAFILE=$(find build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPAFILE" ]; then
            echo "IPA bulunamadı, build başarısız olmuş olabilir"
            exit 0
          fi
          echo "IPA: $IPAFILE"
          mkdir -p /tmp/ipa_check
          cp "$IPAFILE" /tmp/ipa_check/app.ipa
          cd /tmp/ipa_check && unzip -q app.ipa
          echo ""
          echo "=== Bundle kök PNG ikonlar ==="
          ls -la Payload/*.app/*.png 2>/dev/null | grep -i icon || echo "(kök dizinde PNG ikon yok — normal, asset catalog kullanılıyor)"
          echo ""
          echo "=== Assets.car mevcut mu? ==="
          ls -la Payload/*.app/Assets.car 2>/dev/null && echo "✓ Assets.car var" || echo "✗ Assets.car YOK — kritik hata"
          echo ""
          echo "=== Info.plist ikon anahtarları ==="
          plutil -p Payload/*.app/Info.plist 2>/dev/null | grep -i "icon\|CFBundle" || echo "Anahtar bulunamadı"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false


  # ── App Store'a gönder (production) ────────────────────────────────
  ios-app-store:
    name: iOS → App Store
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
        XCODE_SCHEME: "TasarrufX"
      xcode: "26"

    scripts:
      - name: XcodeGen kur
        script: |
          brew install xcodegen

      - name: Xcode projesi oluştur
        script: |
          xcodegen generate --spec project.yml

      - name: Keychain başlat
        script: |
          keychain initialize

      - name: Sertifika ve profil oluştur
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Sertifikaları keychain'e ekle
        script: |
          keychain add-certificates

      - name: Xcode imzalama profilini ayarla
        script: |
          xcode-project use-profiles

      - name: Derle ve IPA oluştur
        script: |
          xcode-project build-ipa \
            --project TasarrufX.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: true
        release_type: MANUAL
