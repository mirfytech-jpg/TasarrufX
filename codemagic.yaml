workflows:

  # ── TestFlight'a yükle (test aşaması) ──────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
        XCODE_SCHEME: "TasarrufX"
        APP_NAME: "TasarrufX"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: İkon boyutlarını üret
        script: |
          set -e
          ICON_DIR="Assets.xcassets/AppIcon.appiconset"
          SRC="$ICON_DIR/AppIcon-1024.png"
          echo "Kaynak: $(ls -la $SRC)"
          for SIZE in 40 58 60 80 87 120 180; do
            sips -z $SIZE $SIZE "$SRC" --out "$ICON_DIR/AppIcon-${SIZE}.png"
            echo "✓ ${SIZE}px üretildi"
          done
          ls -la $ICON_DIR/*.png

      - name: XcodeGen kur
        script: |
          brew install xcodegen

      - name: Xcode projesi oluştur
        script: |
          xcodegen generate --spec project.yml

      - name: Info.plist CFBundleIconName garantile
        script: |
          PLIST=$(find . -name "Info.plist" -not -path "*/.git/*" -not -path "*/DerivedData/*" | head -1)
          echo "Bulunan Info.plist: $PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$PLIST"
          echo "CFBundleIconName = $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIconName' $PLIST)"

      - name: Keychain başlat
        script: |
          keychain initialize

      - name: Sertifika ve profil oluştur (yoksa otomatik yarat)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Sertifikaları keychain'e ekle
        script: |
          keychain add-certificates

      - name: Xcode imzalama profilini ayarla
        script: |
          xcode-project use-profiles

      - name: Build numarasını ayarla
        script: |
          BUILD_NUM=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEXT=$((BUILD_NUM + 1))
          agvtool new-version -all "$NEXT"

      - name: Derle ve IPA oluştur
        script: |
          xcode-project build-ipa \
            --project TasarrufX.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false


  # ── App Store'a gönder (production) ────────────────────────────────
  ios-app-store:
    name: iOS → App Store
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
        XCODE_SCHEME: "TasarrufX"
      xcode: latest

    scripts:
      - name: XcodeGen kur
        script: |
          brew install xcodegen

      - name: Xcode projesi oluştur
        script: |
          xcodegen generate --spec project.yml

      - name: Keychain başlat
        script: |
          keychain initialize

      - name: Sertifika ve profil oluştur
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Sertifikaları keychain'e ekle
        script: |
          keychain add-certificates

      - name: Xcode imzalama profilini ayarla
        script: |
          xcode-project use-profiles

      - name: Derle ve IPA oluştur
        script: |
          xcode-project build-ipa \
            --project TasarrufX.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: true
        release_type: MANUAL
