workflows:

  # ── TestFlight'a yükle (test aşaması) ──────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
        XCODE_SCHEME: "TasarrufX"
        APP_NAME: "TasarrufX"
      xcode: "26"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: XcodeGen kur
        script: |
          brew install xcodegen

      - name: Xcode projesi oluştur
        script: |
          xcodegen generate --spec project.yml

      - name: İkon ve asset kataloğunu doğrula
        script: |
          echo "=== AppIcon PNG dosyaları ==="
          ls -la Assets.xcassets/AppIcon.appiconset/*.png
          echo ""
          echo "=== Contents.json ==="
          cat Assets.xcassets/AppIcon.appiconset/Contents.json
          echo ""
          echo "=== ASSETCATALOG_COMPILER_APPICON_NAME build ayarı ==="
          grep -r "AppIcon" TasarrufX.xcodeproj/project.pbxproj | grep ASSETCATALOG || echo "Ayar bulunamadı"
          echo ""
          echo "=== GENERATE_INFOPLIST_FILE build ayarı ==="
          grep -r "GENERATE_INFOPLIST_FILE" TasarrufX.xcodeproj/project.pbxproj | head -5

      - name: Keychain başlat
        script: |
          keychain initialize

      - name: Sertifika ve profil oluştur (yoksa otomatik yarat)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Sertifikaları keychain'e ekle
        script: |
          keychain add-certificates

      - name: Xcode imzalama profilini ayarla
        script: |
          xcode-project use-profiles

      - name: Build numarasını ayarla
        script: |
          BUILD_NUM=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEXT=$((BUILD_NUM + 1))
          agvtool new-version -all "$NEXT"

      - name: Derle ve IPA oluştur
        script: |
          xcode-project build-ipa \
            --project TasarrufX.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --config Release

      - name: IPA duzelt — ikon + CFBundleIconName + yeniden imzala
        script: |
          set -e
          PROJECT_DIR=$(pwd)

          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then echo "HATA: IPA bulunamadi"; exit 1; fi
          echo "IPA: $IPA"

          WORK="/tmp/ipafix"
          rm -rf "$WORK" && mkdir -p "$WORK"
          cp "$IPA" "$WORK/orig.ipa"
          cd "$WORK" && unzip -q orig.ipa

          APP=$(find Payload -maxdepth 1 -name "*.app" | head -1)
          PLIST="$APP/Info.plist"
          echo "App: $APP"

          echo "--- Oncesi ---"
          plutil -p "$PLIST" | grep -i "icon\|CFBundle" || echo "(icon anahtari yok)"

          # 1. CFBundleIconName ekle / guncelle
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$PLIST"
          echo "CFBundleIconName = $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIconName' "$PLIST")"

          # 2. 120x120 ikonu bundle kokune kopyala
          cp "$PROJECT_DIR/Assets.xcassets/AppIcon.appiconset/AppIcon-120.png" \
             "$APP/AppIcon-60@2x.png"
          echo "AppIcon-60@2x.png eklendi (120x120)"

          # 3. Sertifikay bul (Apple Distribution veya iPhone Distribution)
          CERT=$(security find-identity -v -p codesigning \
            | grep -E "Apple Distribution|iPhone Distribution" \
            | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$CERT" ]; then
            echo "HATA: Dagitim sertifikasi bulunamadi"
            security find-identity -v -p codesigning
            exit 1
          fi
          echo "Sertifika: $CERT"

          # 4. Yeniden imzala (mevcut entitlements korunur)
          codesign -f --sign "$CERT" \
            --preserve-metadata=entitlements,resource-rules,requirements \
            "$APP"
          echo "Yeniden imzalandi"

          # 5. Yeni IPA paketle ve eskisinin yerine koy
          zip -qr fixed.ipa Payload/
          cp fixed.ipa "$PROJECT_DIR/$IPA"
          echo "IPA guncellendi: $PROJECT_DIR/$IPA"

          echo "--- Sonrasi ---"
          plutil -p "$PLIST" | grep -i "icon\|CFBundle"
          ls -la "$APP"/*.png 2>/dev/null || echo "(bundle kokunde PNG yok)"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false


  # ── App Store'a gönder (production) ────────────────────────────────
  ios-app-store:
    name: iOS → App Store
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.mirfytech.TasarrufX"
        XCODE_SCHEME: "TasarrufX"
      xcode: "26"

    scripts:
      - name: XcodeGen kur
        script: |
          brew install xcodegen

      - name: Xcode projesi oluştur
        script: |
          xcodegen generate --spec project.yml

      - name: Keychain başlat
        script: |
          keychain initialize

      - name: Sertifika ve profil oluştur
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Sertifikaları keychain'e ekle
        script: |
          keychain add-certificates

      - name: Xcode imzalama profilini ayarla
        script: |
          xcode-project use-profiles

      - name: Derle ve IPA oluştur
        script: |
          xcode-project build-ipa \
            --project TasarrufX.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: true
        release_type: MANUAL
