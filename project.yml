# XcodeGen proje tanım dosyası
# Codemagic bu dosyadan .xcodeproj otomatik oluşturur

name: TasarrufX

options:
  bundleIdPrefix: com.DEGISTIR          # <-- bundle ID'nin başını değiştir
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"         # Sadece iPhone
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: "NO"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  TasarrufX:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # Kaynak dosyalar
    sources:
      - path: TasarrufXApp.swift
      - path: ContentView.swift
      - path: Core
      - path: Models
      - path: ViewModels
      - path: Views

    # Kaynaklar (bundle'a eklenir)
    resources:
      - path: Resources/alintilar.json
      - path: Assets.xcassets

    # Info.plist — Xcode otomatik oluşturur (GENERATE_INFOPLIST_FILE: YES)
    # Tüm anahtarlar aşağıdaki INFOPLIST_KEY_* ayarlarından gelir

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.mirfytech.TasarrufX"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"

        # Xcode'un Info.plist'i otomatik oluşturmasını sağla
        GENERATE_INFOPLIST_FILE: "YES"

        # Info.plist anahtarları — Xcode bunları doğrudan plist'e yazar
        INFOPLIST_KEY_CFBundleDisplayName: TasarrufX
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_LSRequiresIPhoneOS: "YES"
        INFOPLIST_KEY_UILaunchScreen_UIColorName: ""
        INFOPLIST_KEY_UILaunchScreen_UIImageName: ""
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Günlük finansal motivasyon bildirimleri göndermek için kullanılır."
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UIViewControllerBasedStatusBarAppearance: "NO"
        INFOPLIST_KEY_UIUserInterfaceStyle: Light

      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"

    # Build sürecinde çalışır — codesign'dan ÖNCE bundle içindeki plist ve ikonları düzeltir
    postBuildScripts:
      - name: "CFBundleIconName ve ikon bundle'a garantile"
        script: |
          APP="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app"
          PLIST="${APP}/Info.plist"

          echo "============================================"
          echo "IKON DÜZELTME: $APP"
          echo "============================================"

          # 1. Bundle Info.plist'e CFBundleIconName ekle/güncelle
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$PLIST"
            echo "CFBundleIconName = $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIconName' "$PLIST" 2>/dev/null)"
          else
            echo "HATA: Info.plist bulunamadi: $PLIST"
          fi

          # 2. 120x120 ikonu bundle kok dizinine kopyala (eski stil guvence)
          SRC="${SRCROOT}/Assets.xcassets/AppIcon.appiconset/AppIcon-120.png"
          DST="${APP}/AppIcon-60@2x.png"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            echo "AppIcon-60@2x.png kopyalandi (120x120)"
          else
            echo "UYARI: Kaynak bulunamadi: $SRC"
          fi

          # 3. Mevcut durumu goster
          echo "--- Bundle icerigi ---"
          ls -la "$APP"/*.png 2>/dev/null || echo "(kol dizinde PNG yok)"
          ls -la "$APP/Assets.car" 2>/dev/null && echo "Assets.car mevcut" || echo "Assets.car YOK"
          echo "--- Info.plist icon anahtarlari ---"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST" 2>/dev/null || echo "CFBundleIconName yok"
          echo "============================================"
