# XcodeGen proje tanım dosyası
# Codemagic bu dosyadan .xcodeproj otomatik oluşturur

name: TasarrufX

options:
  bundleIdPrefix: com.DEGISTIR          # <-- bundle ID'nin başını değiştir
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"         # Sadece iPhone
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: "NO"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  TasarrufX:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # Kaynak dosyalar
    sources:
      - path: TasarrufXApp.swift
      - path: ContentView.swift
      - path: Core
      - path: Models
      - path: ViewModels
      - path: Views

    # Kaynaklar (bundle'a eklenir)
    resources:
      - path: Resources/alintilar.json
      - path: Assets.xcassets

    # Info.plist — XcodeGen otomatik oluşturur
    info:
      path: TasarrufX/Info.plist
      properties:
        CFBundleDisplayName: "TasarrufX"
        CFBundleName: "TasarrufX"
        CFBundleIconName: "AppIcon"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UIDeviceFamily:
          - 1                                   # 1=iPhone only, 2=iPad
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSUserNotificationsUsageDescription: >-
          Günlük finansal motivasyon bildirimleri göndermek için kullanılır.
        UIStatusBarStyle: UIStatusBarStyleDefault
        UIViewControllerBasedStatusBarAppearance: false
        UIUserInterfaceStyle: Light

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.mirfytech.TasarrufX"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        GENERATE_INFOPLIST_FILE: "NO"
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
